<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diving In Asia Boekingsformulier / Aanvraag</title>
  <link rel="icon" href="/images/logo.png" />
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #f8f8f8 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .booking-container {
      background: #fff;
      max-width: 420px;
      width: 100%;
      margin: 2rem;
      border-radius: 18px;
      box-shadow: 0 4px 24px #0070ba22;
      padding: 2.5rem 2rem 2rem 2rem;
      text-align: center;
    }
    .logo {
      max-width: 120px;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 2px 8px #0070ba33);
    }
    h1 {
      color: #009688;
      margin-bottom: 0.5rem;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    .subtitle {
      color: #555;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    input, select, textarea {
      padding: 0.7em 1em;
      border: 1px solid #b2dfdb;
      border-radius: 6px;
      font-size: 1rem;
      background: #f8f8f8;
      transition: border 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border: 1.5px solid #009688;
      outline: none;
      background: #e0f2f1;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-size: 1rem;
      color: #00796b;
      margin-bottom: 0.5em;
    }
    button {
      background: #009688;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.9em 0;
      font-size: 1.1em;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 1px 4px #00968822;
      transition: background 0.2s;
      margin-top: 0.5em;
    }
    button:hover {
      background: #00796b;
    }
    .success-message {
      color: #009688;
      background: #e0f7fa;
      border-radius: 8px;
      padding: 1em;
      margin-top: 1em;
      font-size: 1.1em;
      display: none;
    }
    .error-message {
      color: #c62828;
      background: #ffebee;
      border-radius: 8px;
      padding: 1em;
      margin-top: 1em;
      font-size: 1.1em;
      display: none;
    }
  </style>
</head>
<body>
  <div class="booking-container">
    <img src="/images/logo.png" alt="Diving In Asia Logo" class="logo" />
    <h1>Diving In Asia Boekingsformulier</h1>
    <div class="subtitle">Boekings- / Aanvraagformulier</div>
    <a href="/" style="display:inline-block;margin-bottom:1.5em;color:#0070ba;background:#e3f2fd;padding:0.7em 1.5em;border-radius:6px;text-decoration:none;font-weight:500;box-shadow:0 1px 4px #0070ba11;transition:background 0.2s, color 0.2s;">Ga naar de homepage</a>
    <form id="bookingForm">
        <!-- Verborgen veld voor PayPal-link in de e-mail -->
        <input type="hidden" name="PayPal Deposit Link" value="https://paypal.me/prodivingasia" />
      <input type="text" name="name" placeholder="Naam" required />
      <input type="email" name="email" placeholder="E-mail" required />
      <input type="tel" name="phone" placeholder="Telefoon" required />
      <input type="text" name="course" placeholder="Cursus / Pakket" required />
      <input type="date" name="date" placeholder="Voorkeursdatum" required />
      <div class="checkbox-row">
        <input type="checkbox" id="experience" name="experience" />
        <label for="experience">Ervaringsniveau</label>
      </div>
      <select name="level" required>
        <option value="">Selecteer ervaringsniveau...</option>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Gevorderd</option>
        <option value="Advanced">Expert</option>
      </select>
      <textarea name="comments" rows="3" placeholder="Opmerkingen / Vragen"></textarea>
      <button type="submit">Verstuur boeking</button>
    </form>
    <div class="success-message" id="successMsg">
      Dank je wel! Je aanvraag is verzonden.<br>
      <a id="paypalLink" href="https://paypal.me/prodivingasia" target="_blank" style="display:inline-block;margin:1em 0 0.5em 0;padding:0.75em 2em;background:#0070ba;color:#fff;border-radius:4px;font-size:1.1em;text-decoration:none;font-weight:bold;">Betaal aanbetaling via PayPal</a><br>
    </div>
    <div class="error-message" id="errorMsg">Sorry, er is een probleem opgetreden bij het verzenden van je aanvraag. Probeer het opnieuw.</div>
  </div>
  <script>
    // Web3Forms integration
    const form = document.getElementById('bookingForm');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';
      // Append PayPal link to message textarea
      const messageField = form.querySelector('textarea[name="comments"]');
      if (messageField) {
        messageField.value += '\n\nPay your deposit via PayPal: https://paypal.me/prodivingasia';
      }
      const formData = new FormData(form);
      formData.append('access_key', 'e4c4edf6-6e35-456a-87da-b32b961b449a');

      // Prepare booking data for SQLite API
      const bookingData = {
        name: form.elements['name'].value,
        email: form.elements['email'].value,
        phone: form.elements['phone'].value,
        course: form.elements['course'].value,
        date: form.elements['date'].value,
        experience: form.elements['experience'].checked ? 'Yes' : 'No',
        level: form.elements['level'].value,
        comments: messageField ? messageField.value : ''
      };

      // Send to Web3Forms (email)
      try {
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: formData
        });
        const result = await response.json();
        // Send to SQLite API (local server)
        fetch('/api/bookings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bookingData)
        });
        if(result.success) {
          successMsg.style.display = 'block';
          form.reset();
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
