<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diving In Asia Boekingsformulier / Aanvraag</title>
  <link rel="icon" href="/images/logo.png" />
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #f8f8f8 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .booking-container {
      background: #fff;
      max-width: 420px;
      width: 100%;
      margin: 2rem;
      border-radius: 18px;
      box-shadow: 0 4px 24px #0070ba22;
      padding: 2.5rem 2rem 2rem 2rem;
      text-align: center;
    }
    .logo {
      max-width: 120px;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 2px 8px #0070ba33);
    }
    h1 {
      color: #009688;
      margin-bottom: 0.5rem;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    .subtitle {
      color: #555;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    input, select, textarea {
      padding: 0.7em 1em;
      border: 1px solid #b2dfdb;
      border-radius: 6px;
      font-size: 1rem;
      background: #f8f8f8;
      transition: border 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border: 1.5px solid #009688;
      outline: none;
      background: #e0f2f1;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-size: 1rem;
      color: #00796b;
      margin-bottom: 0.5em;
    }
    button {
      background: #009688;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.9em 0;
      font-size: 1.1em;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 1px 4px #00968822;
      transition: background 0.2s;
      margin-top: 0.5em;
    }
    button:hover {
      background: #00796b;
    }
    .success-message {
      color: #009688;
      background: #e0f7fa;
      border-radius: 8px;
      padding: 1em;
      margin-top: 1em;
      font-size: 1.1em;
      display: none;
    }
    .error-message {
      color: #c62828;
      background: #ffebee;
      border-radius: 8px;
      padding: 1em;
      margin-top: 1em;
      font-size: 1.1em;
      display: none;
    }
  </style>
</head>
<body>
  <div class="booking-container">
    <div style="text-align:right; margin-bottom: 0.5em;">
      <button type="button" id="lang-nl" style="margin-right:0.5em;">NL</button>
      <button type="button" id="lang-en">EN</button>
    </div>
    <img src="/images/logo.png" alt="Diving In Asia Logo" class="logo" />
    <h1 id="form-title">Diving In Asia Boekingsformulier</h1>
    <div class="subtitle" id="form-subtitle">Boekings- / Aanvraagformulier</div>
    <a id="home-link" href="/" style="display:inline-block;margin-bottom:1.5em;color:#0070ba;background:#e3f2fd;padding:0.7em 1.5em;border-radius:6px;text-decoration:none;font-weight:500;box-shadow:0 1px 4px #0070ba11;transition:background 0.2s, color 0.2s;">Ga naar de homepage</a>
    <form id="bookingForm">
        <!-- Verborgen veld voor PayPal-link in de e-mail -->
        <input type="hidden" name="PayPal Deposit Link" value="https://paypal.me/prodivingasia" />
      <input type="text" name="name" id="name-input" placeholder="Naam" required />
      <input type="email" name="email" id="email-input" placeholder="E-mail" required />
      <input type="tel" name="phone" id="phone-input" placeholder="Telefoon" required />
      <input type="text" name="course" id="course-input" placeholder="Cursus / Pakket" required />
      <input type="date" name="date" id="date-input" placeholder="Voorkeursdatum" required />
      <div class="checkbox-row">
        <input type="checkbox" id="experience" name="experience" />
        <label for="experience" id="experience-label">Ervaringsniveau</label>
      </div>
      <select name="level" id="level-select" required>
        <option value="">Selecteer ervaringsniveau...</option>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Gevorderd</option>
        <option value="Advanced">Expert</option>
      </select>
      <textarea name="comments" id="comments-input" rows="3" placeholder="Opmerkingen / Vragen"></textarea>
      <button type="submit" id="submit-btn">Verstuur boeking</button>
    </form>
    <div class="success-message" id="successMsg">
      <span id="success-text">Dank je wel! Je aanvraag is verzonden.</span><br>
      <a id="paypalLink" href="https://paypal.me/prodivingasia" target="_blank" style="display:inline-block;margin:1em 0 0.5em 0;padding:0.75em 2em;background:#0070ba;color:#fff;border-radius:4px;font-size:1.1em;text-decoration:none;font-weight:bold;">Betaal aanbetaling via PayPal</a><br>
    </div>
    <div class="error-message" id="errorMsg">Sorry, er is een probleem opgetreden bij het verzenden van je aanvraag. Probeer het opnieuw.</div>
  </div>
  <script>
    // Bilingual translations
    const translations = {
      nl: {
        title: 'Diving In Asia Boekingsformulier',
        subtitle: 'Boekings- / Aanvraagformulier',
        home: 'Ga naar de homepage',
        name: 'Naam',
        email: 'E-mail',
        phone: 'Telefoon',
        course: 'Cursus / Pakket',
        date: 'Voorkeursdatum',
        experience: 'Ervaringsniveau',
        selectLevel: 'Selecteer ervaringsniveau...',
        beginner: 'Beginner',
        intermediate: 'Gevorderd',
        advanced: 'Expert',
        comments: 'Opmerkingen / Vragen',
        submit: 'Verstuur boeking',
        success: 'Dank je wel! Je aanvraag is verzonden.',
        pay: 'Betaal aanbetaling via PayPal',
        error: 'Sorry, er is een probleem opgetreden bij het verzenden van je aanvraag. Probeer het opnieuw.'
      },
      en: {
        title: 'Diving In Asia Booking Form',
        subtitle: 'Booking / Inquiry Form',
        home: 'Go to Homepage',
        name: 'Name',
        email: 'Email',
        phone: 'Phone',
        course: 'Course / Package',
        date: 'Preferred Date',
        experience: 'Experience Level',
        selectLevel: 'Select Experience Level...',
        beginner: 'Beginner',
        intermediate: 'Intermediate',
        advanced: 'Advanced',
        comments: 'Comments / Questions',
        submit: 'Send Booking',
        success: 'Thank you! Your enquiry has been sent.',
        pay: 'Pay Deposit via PayPal',
        error: 'Sorry, there was a problem sending your enquiry. Please try again.'
      }
    };

    function setLang(lang) {
      document.documentElement.lang = lang;
      const t = translations[lang];
      document.getElementById('form-title').textContent = t.title;
      document.getElementById('form-subtitle').textContent = t.subtitle;
      document.getElementById('home-link').textContent = t.home;
      document.getElementById('name-input').placeholder = t.name;
      document.getElementById('email-input').placeholder = t.email;
      document.getElementById('phone-input').placeholder = t.phone;
      document.getElementById('course-input').placeholder = t.course;
      document.getElementById('date-input').placeholder = t.date;
      document.getElementById('experience-label').textContent = t.experience;
      const levelSelect = document.getElementById('level-select');
      levelSelect.options[0].textContent = t.selectLevel;
      levelSelect.options[1].textContent = t.beginner;
      levelSelect.options[2].textContent = t.intermediate;
      levelSelect.options[3].textContent = t.advanced;
      document.getElementById('comments-input').placeholder = t.comments;
      document.getElementById('submit-btn').textContent = t.submit;
      document.getElementById('success-text').textContent = t.success;
      document.getElementById('paypalLink').textContent = t.pay;
      document.getElementById('errorMsg').textContent = t.error;
    }

    document.getElementById('lang-nl').onclick = () => setLang('nl');
    document.getElementById('lang-en').onclick = () => setLang('en');
    // Set default language
    setLang('nl');
    // Web3Forms integration
    const form = document.getElementById('bookingForm');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';
      // Append PayPal link to message textarea
      const messageField = form.querySelector('textarea[name="comments"]');
      if (messageField) {
        const lang = document.documentElement.lang;
        const payText = lang === 'nl' ? 'Betaal je aanbetaling via PayPal: https://paypal.me/prodivingasia' : 'Pay your deposit via PayPal: https://paypal.me/prodivingasia';
        messageField.value += '\n\n' + payText;
      }
      const formData = new FormData(form);
      formData.append('access_key', 'e4c4edf6-6e35-456a-87da-b32b961b449a');

      // Map form fields to Supabase schema
      const bookingData = {
        name: form.elements['name'].value,
        email: form.elements['email'].value,
        phone: form.elements['phone'].value,
        course_title: form.elements['course'].value, // mapped
        preferred_date: form.elements['date'].value, // mapped
        experience_level: (form.elements['experience'].checked ? 'Yes' : 'No') + ' - ' + form.elements['level'].value, // combine
        message: messageField ? messageField.value : '' // mapped
      };

      try {
        // Send to Web3Forms (email)
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: formData
        });
        const result = await response.json();

        // Send to bookings API (Supabase backend)
        const apiRes = await fetch('/api/bookings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bookingData)
        });

        if(result.success && apiRes.ok) {
          successMsg.style.display = 'block';
          form.reset();
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
