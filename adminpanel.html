<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Bookings</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8f8f8; margin: 0; }
    .container { max-width: 900px; margin: 2rem auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px #0070ba22; padding: 2rem; }
    h1 { color: #0070ba; }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    th, td { padding: 0.7em 1em; border-bottom: 1px solid #e0e0e0; text-align: left; }
    th { background: #e0f7fa; color: #0070ba; }
    tr:hover { background: #f1f8e9; }
    .paypal-link { color: #fff; background: #0070ba; padding: 0.4em 1em; border-radius: 4px; text-decoration: none; font-weight: bold; }
    .search-bar { margin-bottom: 1.5em; }
    .search-bar input { padding: 0.5em 1em; border-radius: 6px; border: 1px solid #b2dfdb; font-size: 1em; }
  </style>
</head>
<body>
  <div class="container">
      <button id="newBookingBtn" style="margin-bottom:1em;background:#0070ba;color:#fff;padding:0.7em 2em;border:none;border-radius:6px;cursor:pointer;float:right;">New Booking</button>
    <h1>Booking Admin Panel</h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name, email, course..." />
    </div>
    <table id="bookingsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Course</th>
          <th>Date</th>
          <th>Level</th>
          <th>Experience</th>
          <th>Comments</th>
          <th>PayPal</th>
          <th>Status</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <script>
        // New Booking Modal
        function showNewBookingModal() {
          let modal = document.getElementById('newBookingModal');
          if (!modal) {
            modal = document.createElement('div');
            modal.id = 'newBookingModal';
            modal.style = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:9999;';
            modal.innerHTML = `
              <div style="background:#fff;padding:2em 2em 1em 2em;border-radius:10px;max-width:420px;width:100%;box-shadow:0 4px 24px #0070ba22;">
                <h3 style='margin-top:0;'>Add New Booking</h3>
                <form id="newBookingForm">
                  <input name="name" placeholder="Name" required style="width:100%;margin-bottom:0.7em;padding:0.5em;border-radius:6px;border:1px solid #b2dfdb;" />
                  <input name="email" placeholder="Email" type="email" required style="width:100%;margin-bottom:0.7em;padding:0.5em;border-radius:6px;border:1px solid #b2dfdb;" />
                  <input name="phone" placeholder="Phone" style="width:100%;margin-bottom:0.7em;padding:0.5em;border-radius:6px;border:1px solid #b2dfdb;" />
                  <input name="course" placeholder="Course" required style="width:100%;margin-bottom:0.7em;padding:0.5em;border-radius:6px;border:1px solid #b2dfdb;" />
                  <input name="date" placeholder="Date" type="date" required style="width:100%;margin-bottom:0.7em;padding:0.5em;border-radius:6px;border:1px solid #b2dfdb;" />
                  <input name="level" placeholder="Level" style="width:100%;margin-bottom:0.7em;padding:0.5em;border-radius:6px;border:1px solid #b2dfdb;" />
                  <input name="experience" placeholder="Experience" style="width:100%;margin-bottom:0.7em;padding:0.5em;border-radius:6px;border:1px solid #b2dfdb;" />
                  <textarea name="comments" placeholder="Comments" style="width:100%;margin-bottom:0.7em;padding:0.5em;border-radius:6px;border:1px solid #b2dfdb;"></textarea>
                  <select name="status" style="width:100%;margin-bottom:0.7em;padding:0.5em;border-radius:6px;border:1px solid #b2dfdb;">
                    <option value="pending">pending</option>
                    <option value="paid">paid</option>
                    <option value="cancelled">cancelled</option>
                  </select>
                  <div style="margin-top:1em;text-align:right;">
                    <button type="button" id="modalCancelNewBooking" style="margin-right:1em;padding:0.5em 1.5em;">Cancel</button>
                    <button type="submit" style="background:#0070ba;color:#fff;padding:0.5em 1.5em;border:none;border-radius:6px;">Add</button>
                  </div>
                </form>
              </div>
            `;
            document.body.appendChild(modal);
          } else {
            modal.style.display = 'flex';
          }
          document.getElementById('modalCancelNewBooking').onclick = () => { modal.style.display = 'none'; };
          document.getElementById('newBookingForm').onsubmit = async function(e) {
            e.preventDefault();
            const form = e.target;
            const booking = {
              name: form.name.value,
              email: form.email.value,
              phone: form.phone.value,
              course: form.course.value,
              date: form.date.value,
              level: form.level.value,
              experience: form.experience.value,
              comments: form.comments.value,
              status: form.status.value
            };
            await fetch(`${API_BASE}/api/bookings`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(booking)
            });
            modal.style.display = 'none';
            fetchBookings().then(renderTable);
          };
        }

        document.getElementById('newBookingBtn').onclick = showNewBookingModal;
    // Use localhost for dev, Hostinger API for production
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://api.hostinger.com/v1';
    async function fetchBookings() {
      const res = await fetch(`${API_BASE}/api/bookings`);
      const data = await res.json();
      return data.bookings || [];
    }
    function extractPayPalLink(comments) {
      const match = comments && comments.match(/https:\/\/paypal\.me\/[\w/]+/);
      return match ? match[0] : null;
    }
    function renderTable(bookings) {
      const tbody = document.querySelector('#bookingsTable tbody');
      tbody.innerHTML = '';
      bookings.forEach(b => {
        // Use DB field names for new bookings, fallback to old names for legacy
        const course = b.course_title || b.course || '';
        const date = b.preferred_date || b.date || '';
        const level = b.experience_level || b.level || '';
        const experience = b.experience || '';
        const comments = b.message || b.comments || '';
        const paypalLink = extractPayPalLink(comments);
        tbody.innerHTML += `<tr>
          <td>${b.id}</td>
          <td>${b.name || ''}</td>
          <td>${b.email || ''}</td>
          <td>${b.phone || ''}</td>
          <td>${course}</td>
          <td>${date}</td>
          <td>${level}</td>
          <td>${experience}</td>
          <td style="max-width:200px;white-space:pre-line;">${(comments || '').replace(/(https:\/\/paypal\.me\/[\w\/]+)/g, '<a href="$1" target="_blank" class="paypal-link">PayPal</a>')}</td>
          <td>${paypalLink ? `<a href="${paypalLink}" target="_blank" class="paypal-link">PayPal</a>` : ''}</td>
          <td><select class="status-select" data-id="${b.id}">
            <option value="pending"${b.status === 'pending' ? ' selected' : ''}>pending</option>
            <option value="paid"${b.status === 'paid' ? ' selected' : ''}>paid</option>
            <option value="cancelled"${b.status === 'cancelled' ? ' selected' : ''}>cancelled</option>
          </select></td>
          <td>${b.created_at ? new Date(b.created_at).toLocaleString() : ''}</td>
          <td>
            <button class="edit-btn" data-id="${b.id}">Edit</button>
            <button class="delete-btn" data-id="${b.id}">Delete</button>
          </td>
        </tr>`;
      });
        // Export bookings as CSV
        function exportCSV(bookings) {
          const headers = ['ID','Name','Email','Phone','Course','Date','Level','Experience','Comments','Status','Created'];
          const rows = bookings.map(b => [b.id,b.name,b.email,b.phone,b.course,b.date,b.level,b.experience,b.comments,b.status,b.created_at]);
          let csv = headers.join(',') + '\n';
          csv += rows.map(r => r.map(x => '"'+String(x||'').replace(/"/g,'""')+'"').join(',')).join('\n');
          const blob = new Blob([csv], {type:'text/csv'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'bookings.csv';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }

        // Filter by date/status
        function filterByDateStatus(bookings, date, status) {
          return bookings.filter(b => {
            let match = true;
            if (date) match = match && (b.date === date);
            if (status && status !== 'all') match = match && (b.status === status);
            return match;
          });
        }

        // Handle edit/delete/status change
        document.addEventListener('click', async function(e) {
          if (e.target.classList.contains('delete-btn')) {
            const id = e.target.getAttribute('data-id');
            if (confirm('Delete booking #' + id + '?')) {
              await fetch(`${API_BASE}/api/bookings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status: 'cancelled' })
              });
              fetchBookings().then(renderTable);
            }
          }
          if (e.target.classList.contains('edit-btn')) {
            const id = e.target.getAttribute('data-id');
            // Create a modal for multi-line comment editing (supports Dutch and any language)
            let modal = document.getElementById('editModal');
            if (!modal) {
              modal = document.createElement('div');
              modal.id = 'editModal';
              modal.style = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:9999;';
              modal.innerHTML = `
                <div style="background:#fff;padding:2em 2em 1em 2em;border-radius:10px;max-width:400px;width:100%;box-shadow:0 4px 24px #0070ba22;">
                  <h3 style='margin-top:0;'>Edit Comments (any language)</h3>
                  <textarea id="modalComments" rows="6" style="width:100%;font-size:1em;padding:0.7em 1em;border-radius:6px;border:1px solid #b2dfdb;"></textarea>
                  <div style="margin-top:1em;text-align:right;">
                    <button id="modalCancel" style="margin-right:1em;padding:0.5em 1.5em;">Cancel</button>
                    <button id="modalSave" style="background:#0070ba;color:#fff;padding:0.5em 1.5em;border:none;border-radius:6px;">Save</button>
                  </div>
                </div>
              `;
              document.body.appendChild(modal);
            } else {
              modal.style.display = 'flex';
            }
            // Pre-fill textarea with current comments
            const row = e.target.closest('tr');
            const currentComments = row ? row.querySelector('td:nth-child(9)').innerText : '';
            document.getElementById('modalComments').value = currentComments;
            // Handle modal actions
            document.getElementById('modalCancel').onclick = () => { modal.style.display = 'none'; };
            document.getElementById('modalSave').onclick = async () => {
              const newComments = document.getElementById('modalComments').value;
              modal.style.display = 'none';
              await fetch(`${API_BASE}/api/bookings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, comments: newComments })
              });
              fetchBookings().then(renderTable);
            };
          }
        });
        document.addEventListener('change', async function(e) {
          if (e.target.classList.contains('status-select')) {
            const id = e.target.getAttribute('data-id');
            const status = e.target.value;
            await fetch(`${API_BASE}/api/bookings`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id, status })
            });
            fetchBookings().then(renderTable);
          }
        });
        // Export button
        const exportBtn = document.createElement('button');
        exportBtn.textContent = 'Export CSV';
        exportBtn.style = 'margin-bottom:1em;float:right;background:#0070ba;color:#fff;padding:0.5em 1.2em;border:none;border-radius:6px;cursor:pointer;';
        exportBtn.onclick = async () => {
          const allBookings = await fetchBookings();
          exportCSV(allBookings);
        };
        document.querySelector('.container').insertBefore(exportBtn, document.querySelector('.search-bar'));

        // Date and status filter UI
        const filterDiv = document.createElement('div');
        filterDiv.style = 'margin-bottom:1em;';
        filterDiv.innerHTML = '<input type="date" id="dateFilter" style="margin-right:1em;"/><select id="statusFilter"><option value="all">All Statuses</option><option value="pending">Pending</option><option value="paid">Paid</option><option value="cancelled">Cancelled</option></select>';
        document.querySelector('.container').insertBefore(filterDiv, document.querySelector('.search-bar'));
        document.getElementById('dateFilter').addEventListener('change', async function() {
          const allBookings = await fetchBookings();
          renderTable(filterByDateStatus(allBookings, this.value, document.getElementById('statusFilter').value));
        });
        document.getElementById('statusFilter').addEventListener('change', async function() {
          const allBookings = await fetchBookings();
          renderTable(filterByDateStatus(allBookings, document.getElementById('dateFilter').value, this.value));
        });
    }
    function filterBookings(bookings, query) {
      query = query.toLowerCase();
      return bookings.filter(b =>
        (b.name || '').toLowerCase().includes(query) ||
        (b.email || '').toLowerCase().includes(query) ||
        (b.course || '').toLowerCase().includes(query) ||
        (b.phone || '').toLowerCase().includes(query) ||
        (b.comments || '').toLowerCase().includes(query)
      );
    }
    document.getElementById('searchInput').addEventListener('input', async function() {
      const allBookings = await fetchBookings();
      renderTable(filterBookings(allBookings, this.value));
    });
    // Initial load
    fetchBookings().then(renderTable);
  </script>
</body>
</html>
